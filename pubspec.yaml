name: shalatku
description: \"A new Flutter project.\"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^2.24.0
  firebase_auth: ^4.17.0
  cloud_firestore: ^4.14.0

  # State Management
  provider: ^6.0.0

  # Localization & Date
  intl: ^0.19.0

  # Preferences
  shared_preferences: ^2.2.0

  # Location & Geolocation
  geolocator: ^10.1.0

  # Notifications
  flutter_local_notifications: ^17.1.0
  timezone: ^0.9.1

  # Prayer times calculation
  adhan: ^2.0.0

  # HTTP requests
  http: ^1.1.0

  # Charts
  fl_chart: ^0.64.0

  # Compass
  flutter_compass: ^0.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
